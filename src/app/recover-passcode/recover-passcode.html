<div class="auth-container">
  <div class="reset-card">
    <header>
      <h1>Reset Password</h1>
      <p>Remember your password? <a routerLink="/sign-in">Sign in</a></p>
    </header>

    <div class="card-content">
      <p class="instruction">
        Enter your email address and we'll send you instructions to reset your password.
      </p>

      <div class="form-group">
        <input [(ngModel)]="email" type="email" placeholder="Email address">
      </div>
      <button (click)="resetPassword()" class="btn-submit">Reset Password</button>
    </div>
    <footer>
      <a routerLink="/home" class="help-text">Need help?</a>
    </footer>
  </div>
</div>
