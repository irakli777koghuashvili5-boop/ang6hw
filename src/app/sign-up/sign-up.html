<div class="auth-wrapper" id="register-container">
  <div class="auth-card" id="card-register">
    
    <header id="register-header">
      <h1 id="title-create">Create an Account</h1>
      <p class="subtitle">
        Already have an account? <a routerLink="/sign-in">Sign in</a>
      </p>
    </header>

    @if (formVisible) {
      <form id="form-register" #formRegister="ngForm" (submit)="onCreateAccount(formRegister)">
        <div class="form-row">
          <div class="field-group">
            <input ngModel name="firstName" type="text" id="reg-fname" placeholder=" ">
            <label for="reg-fname">First Name</label>
          </div>
          <div class="field-group">
            <input ngModel name="lastName" type="text" id="reg-lname" placeholder=" ">
            <label for="reg-lname">Last Name</label>
          </div>
        </div>

        <div class="field-group">
          <input ngModel  [(ngModel)]="email" name="email" type="email" id="reg-email" placeholder=" ">
          <label for="reg-email">Email</label>
        </div>

        <div class="field-group password-group">
          <input ngModel    [type]="isPasswordVisible ? 'text' : 'password'"  name="password" id="reg-pass" placeholder=" ">
          <label for="reg-pass">Password</label>
          <span class="eye-icon" (click)="togglePasswordVisibility()"  > 👁</span>
        </div>

        <div class="form-row align-bottom">
          <div class="field-group flex-1">
            <input ngModel name="age" type="number" id="reg-age" placeholder=" ">
            <label for="reg-age">Age</label>
          </div>
          
          <div class="gender-selector">
            <div class="gender-chips">
              <input type="radio" ngModel name="gender" value="MALE" id="male">
              <label for="male">Male</label>
              
              <input type="radio" ngModel name="gender" value="FEMALE" id="female">
              <label for="female">Female</label>
              
              <input type="radio" ngModel name="gender" value="OTHER" id="other">
              <label for="other">Other</label>
            </div>
            <span class="field-label">Gender</span>
          </div>
        </div>

        <div class="field-group">
          <input ngModel name="address" type="text" id="reg-address" placeholder=" ">
          <label for="reg-address">Address</label>
        </div>

        <div class="form-row">
          <div class="field-group flex-2">
            <input ngModel name="phone" type="tel" id="reg-phone" placeholder=" ">
            <label for="reg-phone">Phone</label>
          </div>
          <div class="field-group flex-1">
            <input ngModel name="zipcode" type="text" id="reg-zip" placeholder=" ">
            <label for="reg-zip">Zipcode</label>
          </div>
        </div>

        <button type="submit" [disabled]="formRegister.invalid" class="btn-create">
          Create Account
        </button>
      </form>
    }

    @if (confirmationVisible) {
      <div id="success-block">
        <div class="success-icon">✅</div>
        <p> Account Created Succesfully</p>
        <p id="success-message">Email Confirmation Needed</p>
        <div id="success-actions">
          <button id="btn-resend" class="btn-secondary" (click)="sendConfirm()">Send Confirmation Email</button>
          <button id="btn-signin" class="btn-primary" routerLink="/sign-in">Go to Sign In</button>
        </div>
      </div>
    }

    <footer id="register-footer">
      <p class="terms-text">
        By creating an account, you agree to our 
        <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
      </p>
    </footer>

  </div>
</div>
